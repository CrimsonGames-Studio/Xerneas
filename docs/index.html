<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Xerneas Test</title>
</head>
<body>

<input id="input" placeholder="z.B. html red">
<button id="run">Run</button>

<pre id="output"></pre>

<script type="module">
import { generate } from "../src/core/controller.js";

document.getElementById("run").onclick = async () => {
  const input = document.getElementById("input").value;
  const result = await generate(input);
  document.getElementById("output").textContent = result;
};
</script>

</body>
</html>
